<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#FBF6EC" />
  <title>老乡鸡 · 家常菜谱</title>
  <meta name="description" content="中式快餐市占率第一的老乡鸡，开源了全部菜谱。333道家常菜，无字版涂鸦配图，手机端随手翻。" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <a class="skip-link" href="#grid">跳到菜谱</a>

  <div class="page">
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 48 48" width="40" height="40">
            <g fill="none" stroke="#1F1A16" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
              <path d="M19 22 q-3 -6 3 -8 q2 4 -0 8" />
              <path d="M19 22 q5 -2 7 2 q-4 3 -7 -2" />
              <path d="M26 24 q4 -4 8 0 q-3 5 -8 0" />
              <path d="M21 30 q3 5 6 0" />
              <line x1="24" y1="14" x2="24" y2="9" />
            </g>
            <g fill="none" stroke="#1F1A16" stroke-width="3.2" stroke-linecap="round">
              <path d="M14 40 q10 4 20 0" />
            </g>
          </svg>
        </span>
        <span class="brand-text">
          <strong>老乡鸡 · 家常菜谱</strong>
          <small>像老乡鸡那样做饭</small>
        </span>
      </div>
      <p class="tagline">中式快餐能在国内目前市占率第一，说明菜谱一定符合了最大公约数。以下菜谱源自老乡鸡开源的菜谱，请诸君品鉴。</p>
    </header>

    <div class="scroll-wrap" id="scroll-wrap">
      <div class="searchbar" role="search">
        <label class="sr-only" for="q">搜索菜谱或食材</label>
        <svg class="ic" viewBox="0 0 24 24" aria-hidden="true"><g fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></g></svg>
        <input id="q" type="search" inputmode="search" autocomplete="off" placeholder="搜菜名 / 食材，如 鸡、番茄、蒸" />
        <button id="clear" class="clear" type="button" aria-label="清除搜索" hidden>×</button>
      </div>

      <nav class="filters" aria-label="分类筛选">
        <div class="chips" id="chips"></div>
      </nav>

      <main id="main">
        <div class="resultmeta">
          <span id="count" aria-live="polite">—</span>
        </div>
        <section class="grid" id="grid" aria-label="菜谱列表"></section>
        <div class="empty" id="empty" hidden>
          <div class="empty-doodle" aria-hidden="true">
            <svg viewBox="0 0 120 120" width="96" height="96">
              <g fill="none" stroke="#C9BBA6" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                <path d="M30 70 q30 22 60 0" />
                <path d="M30 70 q30 -10 60 0" />
                <line x1="44" y1="52" x2="44" y2="42"/><line x1="60" y1="50" x2="60" y2="38"/><line x1="76" y1="52" x2="76" y2="42"/>
                <circle cx="60" cy="84" r="3"/>
              </g>
            </svg>
          </div>
          <p class="empty-title">没找到这道菜</p>
          <p class="empty-sub">换个关键词，或看看其他分类吧</p>
        </div>
      </main>
    </div>

    <footer class="foot">
      <p class="foot-src">菜谱内容整理自开源项目 CookLikeHOC（基于《老乡鸡菜品溯源报告》）。</p>
      <p class="foot-note">本页面为同好学习用途，非老乡鸡官方产品；菜肴配图采用无字版 HEYTEA 涂鸦风生成。</p>
    </footer>
  </div>

  <div class="scrim" id="scrim" hidden></div>
  <div class="sheet" id="sheet" role="dialog" aria-modal="true" aria-labelledby="sheet-title" hidden>
    <div class="sheet-handle" aria-hidden="true"></div>
    <button class="sheet-close" id="sheet-close" type="button" aria-label="关闭详情">
      <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true"><g fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></g></svg>
    </button>
    <div class="sheet-body" id="sheet-body"></div>
  </div>

  <script src="data/recipes.js"></script>
  <script src="app.js"></script>
</body>
</html>
